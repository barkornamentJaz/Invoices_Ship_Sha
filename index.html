<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sha &amp; Sha — Invoice Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0f1f3d;--navy2:#1a3260;--blue:#2563eb;--blue-lt:#dbeafe;
  --teal:#0d9488;--teal-lt:#ccfbf1;--green:#16a34a;--green-lt:#dcfce7;
  --amber:#d97706;--amber-lt:#fef3c7;--red:#dc2626;--red-lt:#fee2e2;
  --slate:#64748b;--border:#e2e8f0;--bg:#f0f4f8;--white:#fff;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#1e293b;min-height:100vh}
/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#1e4fd8 100%);
  color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(15,31,61,.45)}
.hdr-in{max-width:1500px;margin:0 auto;padding:16px 24px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:12px}
.brand-ico{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  border:1px solid rgba(255,255,255,.2)}
.brand h1{font-size:19px;font-weight:700;letter-spacing:-.4px}
.brand p{font-size:11px;opacity:.65;margin-top:1px}
.hdr-btns{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-tab{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.15)}
.btn-tab:hover{background:rgba(255,255,255,.22)}
.btn-tab.active{background:#fff;color:var(--navy)}
.btn-add{background:var(--teal);color:#fff}
.btn-add:hover{background:#0f766e}
.btn-sync{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-sync:hover{background:rgba(255,255,255,.22)}
.stats-bar{display:flex;gap:10px;margin-top:13px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 14px}
.stat .sl{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.06em}
.stat .sv{font-size:18px;font-weight:700;line-height:1.2}
/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:16px;color:var(--slate)}
.spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ERROR BOX */
.error-box{background:#fff;border-radius:12px;padding:32px;text-align:center;max-width:560px;margin:40px auto;box-shadow:var(--shadow)}
.error-box .ei{font-size:36px;margin-bottom:12px}
.error-box h3{color:var(--red);margin-bottom:8px}
.error-box p{color:var(--slate);font-size:14px;line-height:1.6}
.error-box code{background:#f1f5f9;padding:6px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;display:block;margin-top:10px;word-break:break-all;text-align:left}
/* CONTENT */
.content{max-width:1500px;margin:0 auto;padding:20px 24px}
/* FILTER BAR */
.fbar{background:#fff;border-radius:12px;padding:13px 17px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.sw{flex:1 1 230px;position:relative}
.sw input{width:100%;padding:9px 12px 9px 34px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;outline:none;font-family:inherit;transition:border-color .15s}
.sw input:focus{border-color:var(--blue)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.38;font-size:15px;pointer-events:none}
.fsel{padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;background:#fff;outline:none;cursor:pointer;transition:border-color .15s;color:#374151;min-width:155px}
.fsel:focus{border-color:var(--blue)}
.btn-clr{padding:9px 13px;border-radius:8px;border:1px solid #fca5a5;background:var(--red-lt);color:var(--red);font-size:13px;cursor:pointer;font-weight:500;font-family:inherit;display:none}
.btn-clr:hover{background:#fecaca}
/* TABLE */
.twrap{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
th{padding:10px 11px;text-align:left;font-weight:600;font-size:11px;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--blue)}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
tbody tr:hover{background:#f8fafc}
tbody tr.erow{background:#fffbeb!important}
td{padding:9px 11px;vertical-align:middle}
.rdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.rcell{display:flex;align-items:center;gap:6px}
.rname{font-weight:500;color:#1e293b}
.cbadge{background:var(--green-lt);color:#166534;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.cnone{color:#cbd5e1;font-size:12px}
.idesc{max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1e293b}
.nr{text-align:right;font-variant-numeric:tabular-nums;color:var(--slate)}
.ar{text-align:right;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums}
tfoot tr{background:var(--green-lt);border-top:2px solid #86efac}
tfoot td{padding:9px 11px;font-weight:700;color:var(--green)}
/* ACTION BUTTONS */
.acts{display:flex;gap:5px;align-items:center;white-space:nowrap}
.be{padding:5px 10px;border-radius:6px;border:1px solid #bfdbfe;background:var(--blue-lt);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.be:hover{background:#bfdbfe}
.bd{padding:5px 10px;border-radius:6px;border:1px solid #fecaca;background:var(--red-lt);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.bd:hover{background:#fecaca}
.bs{padding:5px 10px;border-radius:6px;border:1px solid #86efac;background:var(--green-lt);color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.bs:hover{background:#bbf7d0}
.bc{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#f8fafc;color:var(--slate);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.bc:hover{background:#e2e8f0}
/* INLINE EDIT */
.einp{padding:5px 8px;border-radius:6px;border:1.5px solid var(--blue);font-size:13px;font-family:inherit;outline:none;width:100%;min-width:70px;background:#fffbeb}
/* PAGINATION */
.pag{display:flex;justify-content:center;align-items:center;gap:5px;margin-top:14px;flex-wrap:wrap}
.pg{padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .12s;color:#374151}
.pg:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.pg:disabled{opacity:.35;cursor:default}
.pg.act{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.pg-info{font-size:13px;color:var(--slate);margin-left:8px}
/* SUMMARY */
.cgrid{display:grid;gap:11px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.ccard{background:#fff;border-radius:12px;padding:15px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;border:2px solid transparent}
.ccard:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.ch{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cn{font-weight:700;color:#1e293b;font-size:14px;line-height:1.3}
.cstats{display:flex;gap:14px;align-items:flex-end}
.cst .sl{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.cst .sv{font-size:20px;font-weight:700;color:#1e293b;line-height:1}
.camt{margin-left:auto;text-align:right}
.camt .sl{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.camt .sv{font-size:14px;font-weight:700;color:var(--teal)}
.cbar{margin-top:10px;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.cbarfill{height:100%;border-radius:2px;transition:width .4s}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);display:none;align-items:center;justify-content:center;z-index:300;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:sup .2s ease}
@keyframes sup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mh h2{font-size:17px;font-weight:700;color:#1e293b}
.mclose{background:none;border:none;font-size:20px;cursor:pointer;color:var(--slate)}
.fgrid{display:grid;gap:11px;grid-template-columns:1fr 1fr}
.frow{display:flex;flex-direction:column;gap:4px}
.frow label{font-size:13px;font-weight:600;color:#374151}
.frow input{padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.frow input:focus{border-color:var(--blue)}
.mact{display:flex;gap:9px;margin-top:18px}
.btn-sub{flex:1;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.btn-sub:hover{background:#1d4ed8}
.btn-sub:disabled{background:#93c5fd;cursor:not-allowed}
.btn-can{padding:11px 18px;background:#f1f5f9;color:#374151;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
.btn-can:hover{background:#e2e8f0}
/* DELETE CONFIRM */
.dmodal{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:400px;text-align:center;animation:sup .2s ease}
.dmodal .di{font-size:42px;margin-bottom:12px}
.dmodal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.dmodal p{color:var(--slate);font-size:14px;margin-bottom:20px;line-height:1.5}
.dact{display:flex;gap:9px;justify-content:center}
.btn-dodel{padding:10px 22px;background:var(--red);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-dodel:hover{background:#b91c1c}
.btn-dodel:disabled{background:#fca5a5;cursor:not-allowed}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:400;box-shadow:var(--shadow-md);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#1e293b;color:#fff}
.toast.err{background:var(--red);color:#fff}
.toast.wrn{background:var(--amber);color:#fff}
/* SETUP GUIDE */
.setup{background:#fff;border-radius:12px;padding:28px;max-width:660px;margin:0 auto;box-shadow:var(--shadow)}
.setup h2{font-size:17px;font-weight:700;margin-bottom:16px;color:#1e293b}
.setup ol{padding-left:20px;line-height:2;font-size:14px;color:#374151}
.setup code{background:#f1f5f9;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px}
.setup pre{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;overflow-x:auto;margin:12px 0;line-height:1.7}
.empty{padding:48px;text-align:center;color:#94a3b8}
.empty .ei{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-ico">🏨</div>
        <div>
          <h1>Sha &amp; Sha Invoices</h1>
          <p id="syncStatus">Connecting to Google Sheets…</p>
        </div>
      </div>
      <div class="hdr-btns">
        <button class="btn btn-tab active" id="btnTable" onclick="switchView('table')">📋 Items List</button>
        <button class="btn btn-tab" id="btnSummary" onclick="switchView('summary')">📊 Resort Summary</button>
        <button class="btn btn-sync" onclick="loadData()" id="syncBtn">🔄 Refresh</button>
        <button class="btn btn-add" onclick="openAddModal()">+ New Item</button>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="sl">Total Items</div><div class="sv" id="sItems">—</div></div>
      <div class="stat"><div class="sl">Total Amount</div><div class="sv" id="sAmt">—</div></div>
      <div class="stat"><div class="sl">Resorts</div><div class="sv" id="sResorts">—</div></div>
      <div class="stat"><div class="sl">Invoices</div><div class="sv" id="sInv">—</div></div>
    </div>
  </div>
</div>

<div class="content">
  <!-- FILTER BAR -->
  <div class="fbar">
    <div class="sw"><span class="si">🔍</span>
      <input type="text" id="searchInput" placeholder="Search items, codes, resorts, BO numbers…" oninput="handleSearch()"/>
    </div>
    <select class="fsel" id="resortFilter" onchange="applyFilters()"><option value="">All Resorts</option></select>
    <select class="fsel" id="invoiceFilter" onchange="applyFilters()"><option value="">All Invoices / BO No.</option></select>
    <button class="btn-clr" id="clearBtn" onclick="clearFilters()">✕ Clear</button>
  </div>

  <!-- TABLE VIEW -->
  <div id="viewTable">
    <div id="tableArea">
      <div class="loader"><div class="spinner"></div><span>Loading data from Google Sheets…</span></div>
    </div>
    <div class="pag" id="pagination"></div>
  </div>

  <!-- SUMMARY VIEW -->
  <div id="viewSummary" style="display:none">
    <div class="cgrid" id="summaryGrid"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="mh"><h2 id="formTitle">+ Add New Item</h2>
      <button class="mclose" onclick="closeFormModal()">✕</button></div>
    <div class="fgrid" id="formFields"></div>
    <div class="mact">
      <button class="btn-sub" id="formSubmitBtn" onclick="submitForm()">Add Item</button>
      <button class="btn-can" onclick="closeFormModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="overlay" id="delOverlay">
  <div class="dmodal">
    <div class="di">🗑️</div>
    <h3>Delete this item?</h3>
    <p id="delDesc">This will permanently remove the row from your Google Sheet.</p>
    <div class="dact">
      <button class="btn-dodel" id="delConfirmBtn" onclick="confirmDelete()">Yes, Delete</button>
      <button class="btn-can" onclick="closeDelModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// CONFIG — your Apps Script Web App URL
// ═══════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbwT7cpAky_1nMarAQfjrCQbcLtcxG-dMFuwL23e-mOd3qntgQQ3gvkS0LYjy7_Okmi5UA/exec';

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let allData=[], headers=[], filtered=[];
let currentPage=1, currentView='table';
let sortField='', sortDir='asc';
let editingRowNum=null, pendingDeleteRow=null;

// Resort colour map
const PAL=['#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899',
  '#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6','#f43f5e','#a855f7',
  '#3b82f6','#22c55e','#e11d48','#7c3aed','#0891b2','#65a30d','#ea580c'];
const RC={};
function rc(r){if(!RC[r])RC[r]=PAL[Object.keys(RC).length%PAL.length];return RC[r]}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
const PAGE_SIZE=30;
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pAmt(v){return parseFloat(String(v??'').replace(/[^0-9.-]/g,''))||0}
function fAmt(v){const n=pAmt(v);return n?'LKR '+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}):'—'}
function fNum(v){const n=parseFloat(v)||0;return n?n.toLocaleString():'—'}

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+type;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3200);
}

// Find best matching header key from candidates
function colKey(...candidates){
  for(const c of candidates){
    const k=headers.find(h=>h.toLowerCase().replace(/[\s_-]/g,'').includes(c.toLowerCase().replace(/[\s_-]/g,'')));
    if(k)return k;
  }
  return headers[0]||'';
}

// ═══════════════════════════════════════
// LOAD DATA via JSONP (bypasses CORS)
// Apps Script must return callback(data)
// ═══════════════════════════════════════
function loadData(){
  document.getElementById('syncStatus').textContent='Syncing with Google Sheets…';
  document.getElementById('syncBtn').textContent='⏳ Syncing…';
  document.getElementById('syncBtn').disabled=true;

  const cbName='__gs_'+Date.now();
  const script=document.createElement('script');
  script.src=API+'?action=getAll&callback='+cbName;

  let done=false;
  const cleanup=()=>{done=true;try{document.body.removeChild(script)}catch(e){}
    document.getElementById('syncBtn').textContent='🔄 Refresh';
    document.getElementById('syncBtn').disabled=false;};

  script.onerror=()=>{
    if(done)return; cleanup();
    showConnError();
  };

  // timeout fallback
  const timeout=setTimeout(()=>{
    if(done)return; cleanup();
    showConnError('Request timed out. Check your Apps Script deployment.');
  },15000);

  window[cbName]=(data)=>{
    clearTimeout(timeout);
    cleanup();
    if(data.error){showConnError(data.error);return;}
    headers=data.headers||[];
    allData=(data.rows||[]).map(r=>{
      // ensure _row exists
      return r;
    });
    // seed resort colours
    const rk=colKey('resort','customer','client','entity');
    allData.forEach(r=>{const v=r[rk];if(v)rc(String(v).trim())});
    buildFilters();
    applyFilters();
    const ts=new Date().toLocaleTimeString();
    document.getElementById('syncStatus').textContent=`Synced ${allData.length} items · ${ts}`;
    toast('✓ Loaded '+allData.length+' items from Google Sheets');
  };

  document.body.appendChild(script);
}

function showConnError(msg){
  msg=msg||'Could not reach Google Apps Script.';
  document.getElementById('tableArea').innerHTML=`
    <div class="error-box">
      <div class="ei">⚠️</div>
      <h3>Connection Failed</h3>
      <p>${esc(msg)}</p>
      <p style="margin-top:10px;font-size:13px">
        <strong>Fix:</strong> Your Apps Script must support <code>callback</code> parameter (JSONP).<br>
        Make sure you pasted the updated script and redeployed with <strong>Anyone</strong> access.
      </p>
      <code>${esc(API)}</code>
      <div style="margin-top:16px">
        <button onclick="loadData()" style="padding:10px 20px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px">🔄 Retry</button>
      </div>
    </div>`;
  document.getElementById('syncStatus').textContent='Connection failed';
}

// ═══════════════════════════════════════
// BUILD FILTERS
// ═══════════════════════════════════════
function buildFilters(){
  const rk=colKey('resort','customer','client','entity');
  const ik=colKey('invoice','bono','bo','no');
  const resorts=[...new Set(allData.map(r=>String(r[rk]||'').trim()))].filter(Boolean).sort();
  const invoices=[...new Set(allData.map(r=>String(r[ik]||'').trim()))].filter(Boolean).sort();
  const rf=document.getElementById('resortFilter');
  rf.innerHTML='<option value="">All Resorts</option>';
  resorts.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;rf.appendChild(o)});
  const ivf=document.getElementById('invoiceFilter');
  ivf.innerHTML='<option value="">All Invoices / BO No.</option>';
  invoices.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;ivf.appendChild(o)});
}

// ═══════════════════════════════════════
// FILTER + SORT
// ═══════════════════════════════════════
function handleSearch(){currentPage=1;applyFilters()}
function applyFilters(){
  currentPage=1;
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const res=document.getElementById('resortFilter').value;
  const inv=document.getElementById('invoiceFilter').value;
  const rk=colKey('resort','customer','client','entity');
  const ik=colKey('invoice','bono','bo','no');
  const hasF=q||res||inv;
  document.getElementById('clearBtn').style.display=hasF?'block':'none';
  filtered=allData.filter(r=>{
    if(res&&String(r[rk]||'').trim()!==res)return false;
    if(inv&&String(r[ik]||'').trim()!==inv)return false;
    if(q&&!Object.values(r).join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  if(sortField)doSort();
  updateStats();
  if(currentView==='table')renderTable();
  else renderSummary();
}
function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('resortFilter').value='';
  document.getElementById('invoiceFilter').value='';
  applyFilters();
}
function handleSort(f){
  if(sortField===f)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortField=f;sortDir='asc';}
  currentPage=1;doSort();renderTable();
}
function doSort(){
  const ak=colKey('amount');
  filtered.sort((a,b)=>{
    let av=a[sortField]??'',bv=b[sortField]??'';
    if(sortField===ak){av=pAmt(av);bv=pAmt(bv);}
    else if(!isNaN(parseFloat(av))&&!isNaN(parseFloat(bv))){av=parseFloat(av);bv=parseFloat(bv);}
    if(av<bv)return sortDir==='asc'?-1:1;
    if(av>bv)return sortDir==='asc'?1:-1;
    return 0;
  });
}

// ═══════════════════════════════════════
// STATS
// ═══════════════════════════════════════
function updateStats(){
  const ak=colKey('amount'),rk=colKey('resort','customer','client','entity'),ik=colKey('invoice','bono','bo','no');
  const tot=filtered.reduce((s,r)=>s+pAmt(r[ak]),0);
  document.getElementById('sItems').textContent=filtered.length.toLocaleString();
  document.getElementById('sAmt').textContent='LKR '+(tot/1000000).toFixed(2)+'M';
  document.getElementById('sResorts').textContent=[...new Set(filtered.map(r=>r[rk]))].filter(Boolean).length;
  document.getElementById('sInv').textContent=[...new Set(filtered.map(r=>r[ik]))].filter(Boolean).length;
}

// ═══════════════════════════════════════
// RENDER TABLE
// ═══════════════════════════════════════
function renderTable(){
  const tp=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(currentPage>tp)currentPage=tp;
  const rows=filtered.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);

  const rk=colKey('resort','customer','client','entity');
  const ck=colKey('itemcode','item code','code');
  const dk=colKey('itemdescription','item description','description','item');
  const qk=colKey('qty','quantity');
  const ratk=colKey('rate');
  const ak=colKey('amount');

  const si=(f)=>sortField!==f?'<span style="opacity:.3;margin-left:2px">↕</span>'
    :`<span style="color:var(--blue);margin-left:2px">${sortDir==='asc'?'↑':'↓'}</span>`;

  let html=`<div class="twrap"><div class="tscroll"><table>
    <thead><tr>
    ${headers.map(h=>`<th onclick="handleSort('${esc(h)}')">${esc(h)} ${si(h)}</th>`).join('')}
    <th style="min-width:150px;text-align:center">Actions</th>
    </tr></thead><tbody>`;

  if(!rows.length){
    html+=`<tr><td colspan="${headers.length+1}"><div class="empty"><div class="ei">🔍</div><p>No items found.</p></div></td></tr>`;
  } else {
    rows.forEach(row=>{
      const resort=String(row[rk]||'').trim();
      const c=rc(resort);
      const rn=row._row;
      if(editingRowNum===rn){
        html+=`<tr class="erow">`;
        headers.forEach(h=>{
          html+=`<td><input class="einp" id="ei_${rn}_${esc(h)}" value="${esc(row[h]??'')}" style="min-width:${h===dk?'160px':'70px'}"/></td>`;
        });
        html+=`<td><div class="acts">
          <button class="bs" onclick="saveEdit(${rn})">💾 Save</button>
          <button class="bc" onclick="cancelEdit()">✕</button>
        </div></td></tr>`;
      } else {
        html+=`<tr>`;
        headers.forEach(h=>{
          const v=row[h]??'';
          if(h===rk){
            html+=`<td><div class="rcell"><span class="rdot" style="background:${c}"></span><span class="rname">${esc(v)}</span></div></td>`;
          } else if(h===ck){
            const ok=v&&!['no code','no','nocode',''].includes(String(v).toLowerCase().trim());
            html+=`<td>${ok?`<span class="cbadge">${esc(v)}</span>`:'<span class="cnone">—</span>'}</td>`;
          } else if(h===ak){
            html+=`<td class="ar">${fAmt(v)}</td>`;
          } else if(h===qk||h===ratk){
            html+=`<td class="nr">${fNum(v)}</td>`;
          } else {
            html+=`<td><div class="idesc" title="${esc(v)}">${esc(v)||'—'}</div></td>`;
          }
        });
        html+=`<td><div class="acts">
          <button class="be" onclick="startEdit(${rn})">✏️ Edit</button>
          <button class="bd" onclick="openDel(${rn},'${esc(String(row[dk]||row[rk]||'this item').substring(0,50))}')">🗑️ Del</button>
        </div></td></tr>`;
      }
    });
  }

  const tot=filtered.reduce((s,r)=>s+pAmt(r[ak]),0);
  html+=`</tbody>
    <tfoot><tr>
      <td colspan="${headers.length}" style="text-align:right;padding-right:14px">
        Total (${filtered.length.toLocaleString()} items)
      </td>
      <td class="ar">LKR ${tot.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</td>
    </tr></tfoot>
  </table></div></div>`;

  document.getElementById('tableArea').innerHTML=html;
  renderPagination();
}

// ═══════════════════════════════════════
// PAGINATION
// ═══════════════════════════════════════
function renderPagination(){
  const c=document.getElementById('pagination');
  const tp=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(tp<=1){c.innerHTML='';return;}
  let h='';
  h+=`<button class="pg" onclick="goP(1)" ${currentPage===1?'disabled':''}>«</button>`;
  h+=`<button class="pg" onclick="goP(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  let s=Math.max(1,currentPage-3),e=Math.min(tp,s+6);
  if(e-s<6)s=Math.max(1,e-6);
  for(let p=s;p<=e;p++)h+=`<button class="pg ${p===currentPage?'act':''}" onclick="goP(${p})">${p}</button>`;
  h+=`<button class="pg" onclick="goP(${currentPage+1})" ${currentPage===tp?'disabled':''}>›</button>`;
  h+=`<button class="pg" onclick="goP(${tp})" ${currentPage===tp?'disabled':''}>»</button>`;
  h+=`<span class="pg-info">Page ${currentPage} of ${tp} · ${filtered.length} items</span>`;
  c.innerHTML=h;
}
function goP(p){
  const tp=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  currentPage=Math.max(1,Math.min(tp,p));
  editingRowNum=null;renderTable();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════
// INLINE EDIT
// ═══════════════════════════════════════
function startEdit(rn){editingRowNum=rn;renderTable()}
function cancelEdit(){editingRowNum=null;renderTable()}
function saveEdit(rn){
  const row=allData.find(r=>r._row===rn);
  if(!row)return;
  const updated={};
  headers.forEach(h=>{
    const inp=document.getElementById(`ei_${rn}_${h}`);
    if(inp)updated[h]=inp.value;
  });
  // optimistic local update
  Object.assign(row,updated);
  editingRowNum=null;applyFilters();
  toast('💾 Saving…','wrn');
  apiPost({action:'update',row:rn,data:updated})
    .then(()=>toast('✓ Row updated!','ok'))
    .catch(e=>{toast('❌ Update failed: '+e.message,'err');loadData();});
}

// ═══════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════
function renderSummary(){
  const rk=colKey('resort','customer','client','entity');
  const ak=colKey('amount');
  const ik=colKey('invoice','bono','bo','no');
  const map={};
  filtered.forEach(r=>{
    const res=String(r[rk]||'Unknown').trim();
    if(!map[res])map[res]={resort:res,items:0,amount:0,invs:new Set()};
    map[res].items++;map[res].amount+=pAmt(r[ak]);
    const iv=r[ik];if(iv)map[res].invs.add(iv);
  });
  const list=Object.values(map).sort((a,b)=>b.amount-a.amount);
  const mx=list[0]?.amount||1;
  document.getElementById('summaryGrid').innerHTML=list.map(r=>{
    const c=rc(r.resort);
    const pct=Math.min(100,(r.amount/mx)*100);
    return `<div class="ccard" onclick="drillResort('${esc(r.resort)}')"
      onmouseenter="this.style.borderColor='${c}'"
      onmouseleave="this.style.borderColor='transparent'">
      <div class="ch"><div class="cdot" style="background:${c}"></div>
        <div class="cn">${esc(r.resort)}</div></div>
      <div class="cstats">
        <div class="cst"><div class="sl">Items</div><div class="sv">${r.items}</div></div>
        <div class="cst"><div class="sl">Orders</div><div class="sv">${r.invs.size}</div></div>
        <div class="camt"><div class="sl">Total</div>
          <div class="sv">LKR ${(r.amount/1000).toFixed(0)}K</div></div>
      </div>
      <div class="cbar"><div class="cbarfill" style="width:${pct}%;background:${c}"></div></div>
    </div>`;
  }).join('');
}
function drillResort(resort){
  document.getElementById('resortFilter').value=resort;
  switchView('table');applyFilters();
}

// ═══════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════
function switchView(v){
  currentView=v;
  document.getElementById('viewTable').style.display=v==='table'?'block':'none';
  document.getElementById('viewSummary').style.display=v==='summary'?'block':'none';
  document.getElementById('btnTable').classList.toggle('active',v==='table');
  document.getElementById('btnSummary').classList.toggle('active',v==='summary');
  if(v==='summary')renderSummary();else renderTable();
}

// ═══════════════════════════════════════
// ADD MODAL
// ═══════════════════════════════════════
function openAddModal(){
  document.getElementById('formTitle').textContent='+ Add New Item';
  document.getElementById('formSubmitBtn').textContent='Add Item';
  // Build form fields from actual headers
  document.getElementById('formFields').innerHTML=headers.map(h=>`
    <div class="frow">
      <label>${esc(h)}</label>
      <input id="ff_${esc(h)}" placeholder="${esc(h)}"/>
    </div>`).join('');
  document.getElementById('formOverlay').classList.add('open');
}
function closeFormModal(){document.getElementById('formOverlay').classList.remove('open')}
function submitForm(){
  const data={};let hasVal=false;
  headers.forEach(h=>{
    const v=document.getElementById('ff_'+h)?.value||'';
    data[h]=v;if(v)hasVal=true;
  });
  if(!hasVal){toast('Please fill in at least one field','wrn');return;}
  const btn=document.getElementById('formSubmitBtn');
  btn.disabled=true;btn.textContent='Adding…';
  apiPost({action:'add',data})
    .then(()=>{closeFormModal();toast('✓ Item added to Google Sheets!','ok');loadData();})
    .catch(e=>toast('❌ '+e.message,'err'))
    .finally(()=>{btn.disabled=false;btn.textContent='Add Item';});
}

// ═══════════════════════════════════════
// DELETE
// ═══════════════════════════════════════
function openDel(rn,desc){
  pendingDeleteRow=rn;
  document.getElementById('delDesc').textContent=`"${desc}" — Row ${rn} will be permanently removed from Google Sheets.`;
  document.getElementById('delOverlay').classList.add('open');
}
function closeDelModal(){document.getElementById('delOverlay').classList.remove('open');pendingDeleteRow=null;}
function confirmDelete(){
  if(!pendingDeleteRow)return;
  const btn=document.getElementById('delConfirmBtn');
  btn.disabled=true;btn.textContent='Deleting…';
  apiPost({action:'delete',row:pendingDeleteRow})
    .then(()=>{closeDelModal();toast('🗑️ Row deleted!','ok');loadData();})
    .catch(e=>toast('❌ '+e.message,'err'))
    .finally(()=>{btn.disabled=false;btn.textContent='Yes, Delete';});
}

// ═══════════════════════════════════════
// API POST  (Apps Script handles CORS via
// ContentService with MIME JSON)
// ═══════════════════════════════════════
function apiPost(payload){
  return fetch(API,{method:'POST',body:JSON.stringify(payload)})
    .then(r=>r.json())
    .then(r=>{if(r.error)throw new Error(r.error);return r;});
}

// ═══════════════════════════════════════
// KEYBOARD + CLICK OUTSIDE
// ═══════════════════════════════════════
document.getElementById('formOverlay').addEventListener('click',function(e){if(e.target===this)closeFormModal()});
document.getElementById('delOverlay').addEventListener('click',function(e){if(e.target===this)closeDelModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeFormModal();closeDelModal();}});

// AUTO LOAD
window.addEventListener('load',loadData);
</script>
</body>
</html>
